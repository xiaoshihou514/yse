name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Linux x86_64 desktop (AppImage) ──────────────────────────────────
  desktop:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev patchelf

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Build Tauri desktop
        working-directory: desktop
        run: npx @tauri-apps/cli@^2 build --bundles appimage

      - uses: actions/upload-artifact@v7
        with:
          name: yse-linux-desktop-x86_64
          path: |
            target/release/bundle/appimage/*.AppImage
            target/release/bundle/appimage/*.deb

  # ── Android APK ─────────────────────────────────────────────────────
  android:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android,i686-linux-android

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev patchelf

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 34
          build-tools: '34.0.0'

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Ensure debug keystore exists
        run: |
          KEYSTORE=~/.android/debug.keystore
          mkdir -p ~/.android
          if [ ! -f "$KEYSTORE" ]; then
            echo "Generating debug keystore..."
            keytool -genkey -v -keystore "$KEYSTORE" \
              -alias androiddebugkey -storepass android -keypass android \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -dname "CN=Android Debug,O=Android,C=US"
          else
            echo "Debug keystore already exists"
          fi

      - name: Init Android project
        working-directory: mobile
        continue-on-error: true
        run: npx @tauri-apps/cli@^2 android init

      - name: Install npm deps for mobile
        working-directory: mobile
        run: npm install

      - name: Set up NDK env for OpenSSL build
        run: |
          NDK_DIR=$(ls -1d "$ANDROID_SDK_ROOT/ndk/"*/ 2>/dev/null | head -1)
          BIN_DIR="$NDK_DIR/toolchains/llvm/prebuilt/linux-x86_64/bin"
          echo "TARGET_RANLIB=$BIN_DIR/llvm-ranlib" >> "$GITHUB_ENV"
          echo "CARGO_TARGET_AARCH64_LINUX_ANDROID_RANLIB=$BIN_DIR/llvm-ranlib" >> "$GITHUB_ENV"
          echo "$BIN_DIR" >> "$GITHUB_PATH"

      - name: Build Android APK
        working-directory: mobile
        run: npx @tauri-apps/cli@^2 android build --apk

      - name: Sign APK with debug key
        run: |
          KEYSTORE=~/.android/debug.keystore
          # Find APK: Tauri 2 produces a debug-signed APK; re-sign for CI consistency
          APK=$(find mobile/gen/android -name '*.apk' ! -name '*-unsigned*' | head -1)
          if [ -z "$APK" ]; then
            APK=$(find mobile/gen/android -name '*.apk' | head -1)
          fi
          echo "Found APK: $APK"

          if [ -z "$APK" ]; then
            echo "ERROR: no APK found"
            ls -la mobile/gen/android/app/build/outputs/apk/ 2>/dev/null || true
            exit 1
          fi

          # Re-sign the APK (zipalign + apksigner)
          ALIGNED="${APK%.apk}-aligned.apk"
          zipalign -f -v -p 4 "$APK" "$ALIGNED"
          echo "Signing with debug keystore..."
          apksigner sign --ks "$KEYSTORE" \
            --ks-key-alias androiddebugkey \
            --ks-pass pass:android \
            --key-pass pass:android \
            "$ALIGNED"
          mv -f "$ALIGNED" "mobile/yse-android-universal-release.apk"

      - uses: actions/upload-artifact@v7
        with:
          name: yse-android-apk
          path: mobile/yse-android-universal-release.apk

  # ── Smoke: core tests ────────────────────────────────────────────────
  check:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: cargo check -p yse-core
      - run: cargo test -p yse-core
      - working-directory: frontend
        run: |
          npm ci
          npm run build

  # ── Release: upload artifacts to GitHub Release ─────────────────────
  release:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [desktop, android, check]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Get short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Upload to GitHub Release
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
          NOTES_SHA: ${{ github.sha }}
          NOTES_REF: ${{ github.ref_name }}
          NOTES_MSG: ${{ github.event.head_commit.message }}
          NOTES_TS: ${{ github.event.head_commit.timestamp }}
        run: |
          set -euo pipefail
          gh release delete latest --yes --cleanup-tag 2>/dev/null || true

          # Collect files into array (null-delimited for safety)
          FILES=()
          while IFS= read -r -d '' f; do
            FILES+=("$f")
          done < <(find release-artifacts -type f -print0)

          echo "Uploading ${#FILES[@]} file(s):"
          printf '  %s\n' "${FILES[@]}"

          # Build release notes via printf (safe in YAML run: | block)
          NOTES_FILE=$(mktemp)
          printf "自动构建于 commit \\\`%s\\\`\n\n**分支:** %s\n**Commit:** %s\n**时间:** %s\n" \
            "$NOTES_SHA" "$NOTES_REF" "$NOTES_MSG" "$NOTES_TS" > "$NOTES_FILE"

          gh release create latest \
            --title "Latest Build (${{ steps.sha.outputs.short }})" \
            --notes-file "$NOTES_FILE" \
            --prerelease \
            "${FILES[@]}"
